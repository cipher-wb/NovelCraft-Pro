<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NovelCraft Pro Book Assembly Studio</title>
  <style>
    :root {
      --bg: #f4efe7;
      --panel: #fffaf2;
      --ink: #1f1a17;
      --muted: #6f6257;
      --accent: #b5522d;
      --border: #d9c9b7;
    }
    body { margin: 0; font-family: "Microsoft YaHei", "PingFang SC", sans-serif; background: radial-gradient(circle at top, #fff8eb, var(--bg)); color: var(--ink); }
    main { max-width: 1100px; margin: 0 auto; padding: 24px 20px 48px; }
    section { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 18px; margin-top: 16px; box-shadow: 0 12px 40px rgba(31,26,23,0.06); }
    h1,h2 { margin: 0 0 10px; }
    p { color: var(--muted); }
    label { display:block; margin: 10px 0 6px; font-weight: 600; }
    input { width: 100%; box-sizing: border-box; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border); background: #fff; color: var(--ink); }
    button { margin-top: 12px; padding: 10px 16px; border: 0; border-radius: 999px; background: var(--accent); color: #fff; cursor: pointer; font-weight: 700; margin-right: 8px; }
    pre { white-space: pre-wrap; background: #221d19; color: #f8f3ee; padding: 16px; border-radius: 12px; overflow: auto; }
  </style>
</head>
<body>
<main>
  <h1>NovelCraft Pro Book Assembly Studio</h1>
  <p>Phase 8A 最小整书组装工作台：查看 book、assemble、recheck、finalize。</p>

  <section>
    <h2>1. 载入 Book</h2>
    <label for="projectId">Project ID</label>
    <input id="projectId" placeholder="proj_xxx">
    <button id="loadBook">加载 Book</button>
    <button id="assembleBook">Assemble Book</button>
    <button id="recheckBook">Recheck</button>
    <button id="recheckContinuity">Recheck Continuity</button>
    <button id="finalizeBook">Finalize</button>
    <button id="exportBook">Export Book</button>
  </section>

  <section>
    <h2>2. Assembled 内容</h2>
    <pre id="assembledOutput">等待载入 book...</pre>
  </section>

  <section>
    <h2>3. Checks</h2>
    <pre id="checksOutput">等待检查结果...</pre>
  </section>

  <section>
    <h2>4. Continuity Checks</h2>
    <pre id="continuityOutput">等待 continuity 检查结果...</pre>
  </section>
</main>
<script>
  let currentProjectId = "";
  const assembledOutput = document.getElementById("assembledOutput");
  const checksOutput = document.getElementById("checksOutput");
  const continuityOutput = document.getElementById("continuityOutput");

  async function fetchJson(url, options = {}) {
    const response = await fetch(url, options);
    const payload = await response.json();
    if (!response.ok) throw new Error(JSON.stringify(payload));
    return payload;
  }

  async function loadBook() {
    currentProjectId = document.getElementById("projectId").value.trim();
    if (!currentProjectId) {
      assembledOutput.textContent = "请先输入 project_id。";
      return;
    }
    try {
      const assembled = await fetchJson(`/api/projects/${currentProjectId}/book/assembled`);
      assembledOutput.textContent = JSON.stringify(assembled, null, 2);
    } catch (error) {
      assembledOutput.textContent = String(error);
    }
    try {
      const report = await fetchJson(`/api/projects/${currentProjectId}/book/checks/latest`);
      checksOutput.textContent = JSON.stringify(report, null, 2);
    } catch (error) {
      checksOutput.textContent = String(error);
    }
    try {
      const continuity = await fetchJson(`/api/projects/${currentProjectId}/book/continuity-checks/latest`);
      continuityOutput.textContent = JSON.stringify(continuity, null, 2);
    } catch (error) {
      continuityOutput.textContent = String(error);
    }
  }

  async function callBookAction(action) {
    currentProjectId = document.getElementById("projectId").value.trim();
    if (!currentProjectId) {
      assembledOutput.textContent = "请先输入 project_id。";
      return;
    }
    try {
      const payload = await fetchJson(`/api/projects/${currentProjectId}/book/${action}`, { method: "POST" });
      if (payload.assembled) {
        assembledOutput.textContent = JSON.stringify(payload.assembled, null, 2);
        checksOutput.textContent = JSON.stringify(payload.check_report, null, 2);
        await loadBook();
      } else if (payload.report) {
        if (action === "continuity-checks/recheck") {
          continuityOutput.textContent = JSON.stringify(payload.report, null, 2);
        } else {
          checksOutput.textContent = JSON.stringify(payload.report, null, 2);
        }
        await loadBook();
      }
    } catch (error) {
      assembledOutput.textContent = String(error);
    }
  }

  async function exportBook() {
    currentProjectId = document.getElementById("projectId").value.trim();
    if (!currentProjectId) {
      assembledOutput.textContent = "请先输入 project_id。";
      return;
    }
    try {
      const payload = await fetchJson(`/api/projects/${currentProjectId}/export`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ scope: "book", target_id: "book", format: "markdown_package" }),
      });
      assembledOutput.textContent = JSON.stringify(payload, null, 2);
    } catch (error) {
      assembledOutput.textContent = String(error);
    }
  }

  document.getElementById("loadBook").addEventListener("click", loadBook);
  document.getElementById("assembleBook").addEventListener("click", () => callBookAction("assemble"));
  document.getElementById("recheckBook").addEventListener("click", () => callBookAction("checks/recheck"));
  document.getElementById("recheckContinuity").addEventListener("click", () => callBookAction("continuity-checks/recheck"));
  document.getElementById("finalizeBook").addEventListener("click", () => callBookAction("finalize"));
  document.getElementById("exportBook").addEventListener("click", exportBook);
</script>
</body>
</html>
