<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NovelCraft Pro 风格配置</title>
  <style>
    :root {
      --bg: #f5f1ea;
      --panel: #fffaf3;
      --ink: #241d19;
      --muted: #72675d;
      --accent: #9a4f2c;
      --border: #d8cab7;
    }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: linear-gradient(180deg, #fff9ef 0%, var(--bg) 100%);
      color: var(--ink);
    }
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 20px 48px;
    }
    section {
      margin-top: 16px;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--panel);
      box-shadow: 0 10px 30px rgba(36, 29, 25, 0.06);
    }
    h1, h2 { margin: 0 0 12px; }
    label { display:block; margin: 10px 0 6px; font-weight: 700; }
    input, select, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      color: var(--ink);
    }
    textarea { min-height: 92px; }
    button {
      margin-top: 12px;
      margin-right: 8px;
      padding: 10px 16px;
      border: 0;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    pre {
      white-space: pre-wrap;
      overflow: auto;
      background: #221d19;
      color: #f7f2ed;
      border-radius: 12px;
      padding: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }
    .hint { color: var(--muted); }
  </style>
</head>
<body>
<main>
  <h1>NovelCraft Pro 风格配置</h1>
  <p class="hint">Phase 5B 最小风格配置页：启用 / 关闭风格档案，并保存全局风格约束。</p>

  <section>
    <h2>1. 项目标识</h2>
    <label for="projectId">项目 ID</label>
    <input id="projectId" placeholder="proj_xxx">
    <button id="loadProfile">加载配置</button>
  </section>

  <section>
    <h2>2. 全局风格</h2>
    <div class="grid">
      <div>
        <label for="enabled">是否启用</label>
        <select id="enabled">
          <option value="true">启用</option>
          <option value="false">停用</option>
        </select>
      </div>
      <div>
        <label for="profileName">配置名称</label>
        <input id="profileName">
      </div>
      <div>
        <label for="baseline">句长基线</label>
        <select id="baseline">
          <option value="short">短句</option>
          <option value="medium_short">中短句</option>
          <option value="medium">中句</option>
        </select>
      </div>
      <div>
        <label for="softMaxSentenceChars">句子软上限字数</label>
        <input id="softMaxSentenceChars" type="number" min="0">
      </div>
      <div>
        <label for="softMaxSentences">段落软上限句数</label>
        <input id="softMaxSentences" type="number" min="0">
      </div>
      <div>
        <label for="burstShortLines">短句爆发</label>
        <select id="burstShortLines">
          <option value="true">启用</option>
          <option value="false">停用</option>
        </select>
      </div>
      <div>
        <label for="narrationPerson">叙述人称</label>
        <select id="narrationPerson">
          <option value="third_limited">限制性第三人称</option>
          <option value="first_person">第一人称</option>
        </select>
      </div>
      <div>
        <label for="payoffIntensity">爽点力度</label>
        <select id="payoffIntensity">
          <option value="direct">直接</option>
          <option value="restrained">克制</option>
        </select>
      </div>
    </div>
    <label for="bannedPhrases">禁用短语（每行一个）</label>
    <textarea id="bannedPhrases"></textarea>
    <button id="saveProfile">保存配置</button>
  </section>

  <section>
    <h2>3. 调试输出</h2>
    <pre id="debugOutput">等待加载...</pre>
  </section>
</main>
<script>
  const debugOutput = document.getElementById('debugOutput');

  function setDebug(payload) {
    debugOutput.textContent = typeof payload === 'string' ? payload : JSON.stringify(payload, null, 2);
  }

  function formatError(error) {
    if (error && typeof error === 'object' && error.payload) {
      const detail = error.payload.detail;
      if (detail && typeof detail === 'object' && detail.message) {
        return `请求失败：${detail.message}`;
      }
      if (typeof detail === 'string') {
        return `请求失败：${detail}`;
      }
      return JSON.stringify(error.payload, null, 2);
    }
    const text = String(error);
    return text.startsWith('Error: ') ? text.slice(7) : text;
  }

  async function fetchJson(url, options = {}) {
    const response = await fetch(url, options);
    const payload = await response.json();
    if (!response.ok) {
      throw { status: response.status, payload };
    }
    return payload;
  }

  function applyProfile(profile) {
    document.getElementById('enabled').value = String(profile.enabled);
    document.getElementById('profileName').value = profile.profile_name || '';
    document.getElementById('baseline').value = profile.global_constraints.sentence_rhythm.baseline || 'medium_short';
    document.getElementById('softMaxSentenceChars').value = profile.global_constraints.sentence_rhythm.soft_max_sentence_chars || 0;
    document.getElementById('softMaxSentences').value = profile.global_constraints.paragraph_rhythm.soft_max_sentences || 0;
    document.getElementById('burstShortLines').value = String(profile.global_constraints.sentence_rhythm.burst_short_lines);
    document.getElementById('narrationPerson').value = profile.global_constraints.narrative_habits.narration_person || 'third_limited';
    document.getElementById('payoffIntensity').value = profile.global_constraints.payoff_style.intensity || 'direct';
    document.getElementById('bannedPhrases').value = (profile.global_constraints.banned_phrases || []).join('\n');
  }

  async function loadProfile() {
    const projectId = document.getElementById('projectId').value.trim();
    if (!projectId) {
      setDebug('请先输入项目 ID。');
      return;
    }
    try {
      const payload = await fetchJson(`/api/projects/${projectId}/style/voice-profile`);
      applyProfile(payload.profile);
      setDebug(payload);
    } catch (error) {
      setDebug(formatError(error));
    }
  }

  async function saveProfile() {
    const projectId = document.getElementById('projectId').value.trim();
    if (!projectId) {
      setDebug('请先输入项目 ID。');
      return;
    }
    const payload = {
      project_id: projectId,
      version: 1,
      updated_at: new Date().toISOString(),
      enabled: document.getElementById('enabled').value === 'true',
      profile_name: document.getElementById('profileName').value.trim(),
      global_constraints: {
        sentence_rhythm: {
          baseline: document.getElementById('baseline').value,
          soft_max_sentence_chars: Number(document.getElementById('softMaxSentenceChars').value || 0),
          burst_short_lines: document.getElementById('burstShortLines').value === 'true'
        },
        paragraph_rhythm: {
          preferred_min_sentences: 1,
          preferred_max_sentences: 3,
          soft_max_sentences: Number(document.getElementById('softMaxSentences').value || 0)
        },
        banned_phrases: document.getElementById('bannedPhrases').value
          .split(/\r?\n/)
          .map((item) => item.trim())
          .filter(Boolean),
        narrative_habits: {
          narration_person: document.getElementById('narrationPerson').value,
          exposition_density: 'low',
          inner_monologue_density: 'low',
          dialogue_tag_style: 'simple'
        },
        payoff_style: {
          intensity: document.getElementById('payoffIntensity').value,
          prefer_action_before_reaction: true,
          prefer_concrete_gain: true,
          avoid_empty_hype: true
        }
      },
      character_voice_profiles: [],
      notes: ''
    };
    try {
      const response = await fetchJson(`/api/projects/${projectId}/style/voice-profile`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      applyProfile(response.profile);
      setDebug(response);
    } catch (error) {
      setDebug(formatError(error));
    }
  }

  document.getElementById('loadProfile').addEventListener('click', loadProfile);
  document.getElementById('saveProfile').addEventListener('click', saveProfile);
</script>
</body>
</html>
