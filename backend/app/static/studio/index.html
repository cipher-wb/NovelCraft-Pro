<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NovelCraft Pro 工作台</title>
  <style>
    :root {
      --bg: #f4efe7;
      --panel: #fffaf2;
      --ink: #1f1a17;
      --muted: #6f6257;
      --accent: #b5522d;
      --border: #d9c9b7;
    }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: radial-gradient(circle at top, #fff8eb, var(--bg));
      color: var(--ink);
    }
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }
    h1 { margin: 0 0 12px; }
    p { color: var(--muted); }
    section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-top: 20px;
      box-shadow: 0 12px 40px rgba(31, 26, 23, 0.06);
    }
    label { display:block; margin: 12px 0 6px; font-weight: 600; }
    input, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--ink);
    }
    button {
      margin-top: 14px;
      padding: 10px 16px;
      border: 0;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-weight: 700;
    }
    pre {
      white-space: pre-wrap;
      background: #221d19;
      color: #f8f3ee;
      padding: 16px;
      border-radius: 12px;
      overflow: auto;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }
  </style>
</head>
<body>
<main>
  <h1>NovelCraft Pro</h1>
  <p>当前工作台用于串起项目创建、场景 / 章节 / 卷 / 整书主链，以及 Phase 10B 的导出 / 导入 / 归档 / 备份 / 重建 / 诊断最小收尾链。</p>
  <p><a href="/studio/scene.html">打开场景草稿页面</a></p>
  <p><a href="/studio/style.html">打开风格配置页面</a></p>
  <p><a href="/studio/chapter.html">打开章节组装页面</a></p>
  <p><a href="/studio/volume.html">打开卷组装页面</a></p>
  <p><a href="/studio/book.html">打开整书组装页面</a></p>

  <section>
    <h2>0. 项目体检</h2>
    <label for="projectHealthId">项目 ID</label>
    <input id="projectHealthId" placeholder="proj_xxx">
    <button id="loadHealth">加载体检</button>
    <button id="rebuildAll">全量重建</button>
    <button id="rebuildMemory">重建记忆</button>
    <button id="rebuildChapters">重建章节</button>
    <button id="rebuildVolumes">重建卷</button>
    <button id="rebuildBook">重建整书</button>
    <button id="rebuildChecks">重跑检查</button>
    <button id="exportBook">导出整书</button>
    <pre id="healthOutput">等待体检信息...</pre>
    <pre id="rebuildOutput">等待重建 / 导出结果...</pre>
  </section>

  <section>
    <h2>0.5 项目打包</h2>
    <label for="projectPackagePath">包路径</label>
    <input id="projectPackagePath" placeholder="examples/sample-project-package 或项目内导出目录">
    <label for="archiveLabel">归档标签</label>
    <input id="archiveLabel" placeholder="发布候选">
    <button id="exportProjectPackage">导出项目包</button>
    <button id="importProjectPackage">导入项目包</button>
    <button id="createArchiveSnapshot">创建归档快照</button>
    <button id="createBackup">创建备份</button>
    <button id="loadSnapshots">加载快照列表</button>
    <pre id="snapshotOutput">等待导入 / 归档 / 备份 / 快照结果...</pre>
  </section>

  <section>
    <h2>1. 创建项目</h2>
    <div class="grid">
      <div>
        <label for="title">书名</label>
        <input id="title" value="我的新书">
      </div>
      <div>
        <label for="genre">题材</label>
        <input id="genre" value="修仙爽文">
      </div>
      <div>
        <label for="targetChapters">目标章数</label>
        <input id="targetChapters" type="number" value="300">
      </div>
      <div>
        <label for="targetWords">目标字数</label>
        <input id="targetWords" type="number" value="2000000">
      </div>
    </div>
    <button id="createProject">创建项目</button>
  </section>

  <section>
    <h2>2. 启动立项顾问</h2>
    <label for="brief">项目简介</label>
    <textarea id="brief" rows="3">想写一本都市修仙打脸升级流</textarea>
    <label for="subgenres">细分题材（逗号分隔）</label>
    <input id="subgenres" value="都市异能,升级流">
    <label for="constraints">约束（逗号分隔）</label>
    <input id="constraints" value="作者主导,长线连载">
    <button id="startConsultant">启动顾问会话</button>
  </section>

  <section>
    <h2>3. 回答当前问题</h2>
    <div id="questionBox">当前还没有问题。</div>
    <label for="answer">回答</label>
    <textarea id="answer" rows="3"></textarea>
    <button id="submitAnswer">提交回答</button>
    <button id="finalizeSession">生成立项档案</button>
  </section>

  <section>
    <h2>调试输出</h2>
    <pre id="output">等待操作...</pre>
  </section>
</main>
<script>
  let projectId = null;
  let sessionId = null;
  let currentQuestion = null;

  const output = document.getElementById('output');
  const questionBox = document.getElementById('questionBox');
  const healthOutput = document.getElementById('healthOutput');
  const rebuildOutput = document.getElementById('rebuildOutput');
  const snapshotOutput = document.getElementById('snapshotOutput');

  function setOutput(payload) {
    output.textContent = typeof payload === 'string' ? payload : JSON.stringify(payload, null, 2);
  }

  function setHealth(payload) {
    healthOutput.textContent = typeof payload === 'string' ? payload : JSON.stringify(payload, null, 2);
  }

  function setRebuild(payload) {
    rebuildOutput.textContent = typeof payload === 'string' ? payload : JSON.stringify(payload, null, 2);
  }

  function setSnapshots(payload) {
    snapshotOutput.textContent = typeof payload === 'string' ? payload : JSON.stringify(payload, null, 2);
  }

  function formatProductizationError(error) {
    const status = error?.status || 0;
    const payload = error?.payload || null;
    const detail = payload?.detail;
    if (detail && typeof detail === 'object') {
      return JSON.stringify({
        status,
        code: detail.code || 'unexpected_error',
        message: detail.message || '发生了未预期的成品化错误'
      }, null, 2);
    }
    if (typeof detail === 'string') {
      return JSON.stringify({
        status,
        code: 'unexpected_error',
        message: detail
      }, null, 2);
    }
    return JSON.stringify({
      status,
      code: 'unexpected_error',
      message: String(error)
    }, null, 2);
  }

  async function postProductizationJson(url, body) {
    const response = await fetch(url, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    const payload = await response.json();
    if (!response.ok) {
      throw {status: response.status, payload};
    }
    return payload;
  }

  async function getProductizationJson(url) {
    const response = await fetch(url);
    const payload = await response.json();
    if (!response.ok) {
      throw {status: response.status, payload};
    }
    return payload;
  }

  function setQuestion(question) {
    currentQuestion = question;
    if (!question) {
      questionBox.textContent = '所有问题已回答，可以生成立项档案。';
      return;
    }
    questionBox.textContent = `${question.question_id}: ${question.prompt}`;
  }

  async function postJson(url, body) {
    const response = await fetch(url, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    const payload = await response.json();
    if (!response.ok) {
      throw new Error(JSON.stringify(payload));
    }
    return payload;
  }

  document.getElementById('createProject').addEventListener('click', async () => {
    const payload = await postJson('/api/projects', {
      title: document.getElementById('title').value,
      genre: document.getElementById('genre').value,
      target_chapters: Number(document.getElementById('targetChapters').value),
      target_words: Number(document.getElementById('targetWords').value)
    });
    projectId = payload.project_id;
    document.getElementById('projectHealthId').value = projectId;
    setOutput(payload);
  });

  document.getElementById('startConsultant').addEventListener('click', async () => {
    if (!projectId) {
      setOutput('请先创建项目。');
      return;
    }
    const payload = await postJson(`/api/projects/${projectId}/consultant/sessions`, {
      brief: document.getElementById('brief').value,
      preferred_subgenres: document.getElementById('subgenres').value.split(',').map(v => v.trim()).filter(Boolean),
      constraints: document.getElementById('constraints').value.split(',').map(v => v.trim()).filter(Boolean)
    });
    sessionId = payload.session_id;
    setQuestion(payload.current_question);
    setOutput(payload);
  });

  document.getElementById('submitAnswer').addEventListener('click', async () => {
    if (!sessionId || !currentQuestion) {
      setOutput('当前没有可回答的问题。');
      return;
    }
    const payload = await postJson(`/api/consultant/sessions/${sessionId}/answer`, {
      question_id: currentQuestion.question_id,
      answer: document.getElementById('answer').value
    });
    setQuestion(payload.current_question);
    document.getElementById('answer').value = '';
    setOutput(payload);
  });

  document.getElementById('finalizeSession').addEventListener('click', async () => {
    if (!sessionId) {
      setOutput('请先启动顾问会话。');
      return;
    }
    const response = await fetch(`/api/consultant/sessions/${sessionId}/finalize`, {method: 'POST'});
    const payload = await response.json();
    if (!response.ok) {
      setOutput(payload);
      return;
    }
    setOutput(payload);
  });

  async function loadHealth() {
    const targetProjectId = document.getElementById('projectHealthId').value.trim() || projectId;
    if (!targetProjectId) {
      setHealth('请先输入项目 ID。');
      return;
    }
    try {
      const payload = await getProductizationJson(`/api/projects/${targetProjectId}/diagnostics/health`);
      setHealth(payload);
    } catch (error) {
      setHealth(formatProductizationError(error));
    }
  }

  async function rebuild(targets = []) {
    const targetProjectId = document.getElementById('projectHealthId').value.trim() || projectId;
    if (!targetProjectId) {
      setRebuild('请先输入项目 ID。');
      return;
    }
    try {
      const payload = await postProductizationJson(`/api/projects/${targetProjectId}/rebuild`, { targets });
      setRebuild(payload);
      await loadHealth();
    } catch (error) {
      setRebuild(formatProductizationError(error));
    }
  }

  async function exportBook() {
    const targetProjectId = document.getElementById('projectHealthId').value.trim() || projectId;
    if (!targetProjectId) {
      setRebuild('请先输入项目 ID。');
      return;
    }
    try {
      const payload = await postProductizationJson(`/api/projects/${targetProjectId}/export`, {
        scope: 'book',
        target_id: 'book',
        format: 'markdown_package'
      });
      setRebuild(payload);
    } catch (error) {
      setRebuild(formatProductizationError(error));
    }
  }

  async function exportProjectPackage() {
    const targetProjectId = document.getElementById('projectHealthId').value.trim() || projectId;
    if (!targetProjectId) {
      setSnapshots('请先输入项目 ID。');
      return;
    }
    try {
      const payload = await postProductizationJson(`/api/projects/${targetProjectId}/export`, {
        scope: 'project',
        format: 'json_package'
      });
      setSnapshots(payload);
      document.getElementById('projectPackagePath').value = payload.relative_dir || '';
    } catch (error) {
      setSnapshots(formatProductizationError(error));
    }
  }

  async function importProjectPackage() {
    const packagePath = document.getElementById('projectPackagePath').value.trim();
    if (!packagePath) {
      setSnapshots('请先输入包路径。');
      return;
    }
    try {
      const payload = await postProductizationJson('/api/projects/import-package', {
        package_path: packagePath,
        mode: 'create_new'
      });
      setSnapshots(payload);
    } catch (error) {
      setSnapshots(formatProductizationError(error));
    }
  }

  async function createArchiveSnapshot() {
    const targetProjectId = document.getElementById('projectHealthId').value.trim() || projectId;
    if (!targetProjectId) {
      setSnapshots('请先输入项目 ID。');
      return;
    }
    try {
      const payload = await postProductizationJson(`/api/projects/${targetProjectId}/archive-snapshot`, {
        label: document.getElementById('archiveLabel').value,
        format: 'json_package'
      });
      setSnapshots(payload);
    } catch (error) {
      setSnapshots(formatProductizationError(error));
    }
  }

  async function createBackup() {
    const targetProjectId = document.getElementById('projectHealthId').value.trim() || projectId;
    if (!targetProjectId) {
      setSnapshots('请先输入项目 ID。');
      return;
    }
    try {
      const payload = await postProductizationJson(`/api/projects/${targetProjectId}/backup`, {
        format: 'json_package'
      });
      setSnapshots(payload);
    } catch (error) {
      setSnapshots(formatProductizationError(error));
    }
  }

  async function loadSnapshots() {
    const targetProjectId = document.getElementById('projectHealthId').value.trim() || projectId;
    if (!targetProjectId) {
      setSnapshots('请先输入项目 ID。');
      return;
    }
    try {
      const payload = await getProductizationJson(`/api/projects/${targetProjectId}/snapshots`);
      setSnapshots(payload);
    } catch (error) {
      setSnapshots(formatProductizationError(error));
    }
  }

  document.getElementById('loadHealth').addEventListener('click', loadHealth);
  document.getElementById('rebuildAll').addEventListener('click', () => rebuild([]));
  document.getElementById('rebuildMemory').addEventListener('click', () => rebuild(['memory']));
  document.getElementById('rebuildChapters').addEventListener('click', () => rebuild(['chapters']));
  document.getElementById('rebuildVolumes').addEventListener('click', () => rebuild(['volumes']));
  document.getElementById('rebuildBook').addEventListener('click', () => rebuild(['book']));
  document.getElementById('rebuildChecks').addEventListener('click', () => rebuild(['checks']));
  document.getElementById('exportBook').addEventListener('click', exportBook);
  document.getElementById('exportProjectPackage').addEventListener('click', exportProjectPackage);
  document.getElementById('importProjectPackage').addEventListener('click', importProjectPackage);
  document.getElementById('createArchiveSnapshot').addEventListener('click', createArchiveSnapshot);
  document.getElementById('createBackup').addEventListener('click', createBackup);
  document.getElementById('loadSnapshots').addEventListener('click', loadSnapshots);
</script>
</body>
</html>
